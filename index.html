<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLGC 2026 | Inscrições</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --gray: #161616; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Cabeçalho com Vídeo */
        .header { position: relative; height: 300px; overflow: hidden; display: flex; justify-content: center; align-items: center; border-bottom: 3px solid var(--gold); }
        .video-bg { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; z-index: 1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 2; }
        .title { position: relative; z-index: 3; color: var(--gold); font-size: 2.5rem; letter-spacing: 5px; text-shadow: 0 0 15px rgba(212,175,55,0.5); margin: 0; text-align: center; }

        /* Formulário de Inscrição */
        .container { padding: 20px; max-width: 450px; margin: -50px auto 40px; position: relative; z-index: 4; width: 90%; }
        .card { background: var(--gray); padding: 30px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.8); box-sizing: border-box; }
        h2 { margin-top: 0; color: var(--gold); font-size: 1.4rem; text-align: center; text-transform: uppercase; margin-bottom: 25px; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: var(--gold); font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 5px rgba(212,175,55,0.3); }

        .btn-submit { width: 100%; background: var(--gold); color: #000; padding: 16px; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1rem; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .btn-submit:hover { background: #b8962d; transform: translateY(-2px); }
        .btn-submit:active { transform: translateY(0); }

        .note { font-size: 0.7rem; color: #777; margin-top: 15px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="header">
        <video autoplay muted loop playsinline class="video-bg">
            <source src="https://www.dropbox.com/scl/fi/shd6hplc57y8zd9biesal/gemini_generated_video_5e94a4f3.mp4?rlkey=ouon2fdjmp7tlvknlifjikff3&st=zszbw1n1&raw=1" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <h1 class="title">PLGC 2026</h1>
    </div>

    <div class="container">
        <div class="card">
            <h2>Requerimento de Inscrição</h2>
            
            <form id="inscricaoForm">
                <div class="input-group">
                    <label>NOME DO SQUAD</label>
                    <input type="text" id="squad" placeholder="Ex: Nome da Equipe" required>
                </div>

                <div class="input-group">
                    <label>ID DO CAPITÃO</label>
                    <input type="text" id="capitao" placeholder="Ex: 58432109" required>
                </div>

                <div class="input-group">
                    <label>MEMBROS DA LINE-UP (NOMES/IDS)</label>
                    <textarea id="membros" rows="5" placeholder="1. Nome (ID)&#10;2. Nome (ID)&#10;3. Nome (ID)..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Finalizar Inscrição</button>
            </form>
            
            <p class="note">
                Ao clicar, seu aplicativo de e-mail abrirá automaticamente<br>
                com os dados preenchidos para envio à PLGC.
            </p>
        </div>
    </div>

    <script>
        document.getElementById('inscricaoForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Dados do formulário
            const squad = document.getElementById('squad').value;
            const capitao = document.getElementById('capitao').value;
            const membros = document.getElementById('membros').value;

            // Configuração do E-mail
            const emailDestino = "PLGC@outlook.com.br";
            const assunto = `REQUERIMENTO DE INSCRIÇÃO - SQUAD: ${squad}`;
            
            // Corpo do E-mail formatado
            const corpoEmail = `Prezados,%0D%0A%0D%0AGostaria de solicitar a inscrição para o PLGC 2026.%0D%0A%0D%0A--- DADOS DO SQUAD ---%0D%0A%0D%0ANome do Squad: ${squad}%0D%0AID do Capitão: ${capitao}%0D%0A%0D%0ALINE-UP:%0D%0A${membros.replace(/\n/g, '%0D%0A')}%0D%0A%0D%0AAguardamos confirmação.`;

            // Abre o cliente de e-mail
            window.location.href = `mailto:${emailDestino}?subject=${encodeURIComponent(assunto)}&body=${corpoEmail}`;
        });
    </script>

</body>
</html>
